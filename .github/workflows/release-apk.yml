name: Release APK

# Trigger: push tag v* → build debug APK → attach to GitHub Release.
# Signed release builds: добавь KEYSTORE_BASE64 / KEYSTORE_PASSWORD /
# KEY_ALIAS / KEY_PASSWORD как Repository Secrets и поменяй task на
# assembleRelease (см. docs/ANDROID.md).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.0.0-manual"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # для создания Release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # `gradle` гарантированно ставим через official action — на свежих
      # runner-images он preinstalled, но не на каждом self-hosted, поэтому
      # явный шаг безопаснее. Заодно кеширует gradle distribution.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew || true

      - name: Build debug APK
        working-directory: android
        run: |
          # gradlew (POSIX) не закоммичен — генерируем на лету, gradle уже
          # доступен из setup-gradle action выше.
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.11.1
            chmod +x gradlew
          fi
          ./gradlew assembleDebug --no-daemon --console=plain

      - name: Compute tag name
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK with tag
        working-directory: android/app/build/outputs/apk/debug
        run: |
          mv app-debug.apk "ai-mood-pet-${{ steps.tag.outputs.name }}-debug.apk"
          ls -la

      - name: Create GitHub Release + upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/debug/ai-mood-pet-*.apk
          body: |
            **Debug build** — installable but not signed for Play Store.

            Скачай APK ниже, установи на Android, в Settings введи WS URL +
            AUTH_TOKEN своего сервера (см. [DEPLOY.md](https://github.com/jetmil/ai-mood-pet/blob/master/docs/DEPLOY.md)).

            Перед первым запуском скачай ML-модели в `app/src/main/assets/`
            (face_landmarker.task, hand_landmarker.task, vosk-model-ru) —
            см. [android/app/src/main/assets/README.md](https://github.com/jetmil/ai-mood-pet/blob/master/android/app/src/main/assets/README.md).
